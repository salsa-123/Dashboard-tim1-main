<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Tim 1</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app">
<!-- ==========================================================================
     STRUKTUR HTML SIDEBAR (VERSI TOMBOL KOTAK KECIL DENGAN GARIS & PANAH HOVER)
     ========================================================================== -->

<!-- SIDEBAR -->
<aside class="sidebar" id="mySidebar">
  <div class="sidebar-brand">
    <!-- 🟢 TOMBOL KOTAK KECIL (Hanya garis lurus, panah muncul saat hover kursor) -->
    <button id="brandToggle" class="brand-toggle-btn">
      <span class="toggle-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <!-- Garis Tegak Lurus Tetap (Selalu Muncul) -->
          <line x1="6" y1="4" x2="6" y2="20" class="gemini-line"></line>
          <!-- Panah Kiri (Tersembunyi, Muncul Saat Hover) -->
          <polyline points="18 5 11 12 18 19" class="gemini-arrow"></polyline>
        </svg>
      </span>
      
      <!-- Balon text hitam melayang di samping tombol -->
      <span class="sidebar-tooltip">Tutup sidebar</span>
    </button>

    <!-- 🟢 LOGO & NAMA APLIKASI (Terpisah rapi agar tidak ikut rusak/terdorong teks) -->
    <div class="brand-logo-wrapper">
      <span class="brand-name">Team Work</span>
    </div>
  </div>

  <nav class="sidebar-nav">
  <!-- Dashboard -->
  <a href="#Home" class="nav-item active" data-page="dashboard">
    <span class="nav-icon"><i class="fa-solid fa-gauge"></i></span> Dashboard
  </a>

  <!-- Proyek -->
  <a href="#proyek" class="nav-item" data-page="proyek">
    <span class="nav-icon"><i class="fa-solid fa-folder-open"></i></span> Proyek
  </a>

  <!-- Tugas -->
  <a href="#tugas" class="nav-item" data-page="tugas">
    <span class="nav-icon"><i class="fa-solid fa-list-check"></i></span> Tugas
  </a>

  <!-- Laporan -->
  <a href="#laporan" class="nav-item" data-page="laporan">
    <span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span> Laporan
  </a>

  <!-- Pengaturan -->
  <a href="#pengaturan" class="nav-item" data-page="pengaturan">
    <span class="nav-icon"><i class="fa-solid fa-gear"></i></span> Pengaturan
  </a>
</nav>
  
  <div class="sidebar-footer">
    <a href="#" class="nav-item logout-item" id="btnLogout">
      <span class="nav-icon">⏻</span> Logout
    </a>
  </div>
</aside>

<!-- ================= HALAMAN : Tugas ================= -->
<section class="page" id="page-tugas">
  <div class="panel tugas-panel">

    <div class="page-header tugas-header">
      <div>
        <h2 class="page-title">
          <i class="fa-solid fa-list-check"></i>
          Daftar Tugas
        </h2>
        <p class="page-subtitle">Kelola dan pantau progres tugas semua tim </p>
      </div>

      <button class="btn-primary" id="btnTambahTugas">
        <i class="fa-solid fa-plus"></i>
        Tambah Tugas
      </button>
    </div>

    <!-- STAT RINGKAS -->
    <div class="tugas-stat-grid">
      <div class="tugas-stat-card">
        <div class="tugas-stat-icon total"><i class="fa-solid fa-list-check"></i></div>
        <div>
          <span class="tugas-stat-label">Total Tugas</span>
          <span class="tugas-stat-value" id="statTotalTugas">0</span>
        </div>
      </div>
      <div class="tugas-stat-card">
        <div class="tugas-stat-icon selesai"><i class="fa-solid fa-check"></i></div>
        <div>
          <span class="tugas-stat-label">Selesai</span>
          <span class="tugas-stat-value" id="statSelesaiTugas">0</span>
        </div>
      </div>
      <div class="tugas-stat-card">
        <div class="tugas-stat-icon proses"><i class="fa-solid fa-spinner"></i></div>
        <div>
          <span class="tugas-stat-label">Sedang Berjalan</span>
          <span class="tugas-stat-value" id="statProsesTugas">0</span>
        </div>
      </div>
      <div class="tugas-stat-card">
        <div class="tugas-stat-icon belum"><i class="fa-solid fa-circle"></i></div>
        <div>
          <span class="tugas-stat-label">Belum Mulai</span>
          <span class="tugas-stat-value" id="statBelumTugas">0</span>
        </div>
      </div>
    </div>

    <!-- SEARCH & FILTER -->
    <div class="tugas-toolbar">
      <div class="tugas-search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchTugas" placeholder="Cari nama tugas atau penanggung jawab...">
      </div>
      <select id="filterStatusTugas" class="tugas-filter-select">
        <option value="">Semua Status</option>
        <option value="selesai">Selesai</option>
        <option value="proses">Sedang Berjalan</option>
        <option value="belum">Belum Mulai</option>
      </select>
    </div>

    <div class="table-wrapper">
      <table class="task-table" id="tabelTugas">
        <thead>
          <tr>
            <th>No</th>
            <th class="th-sort" data-sort="nama">Nama Tugas <i class="fa-solid fa-sort"></i></th>            
            <th class="th-sort" data-sort="deadline">Deadline <i class="fa-solid fa-sort"></i></th>
            <th class="th-sort" data-sort="status">Status <i class="fa-solid fa-sort"></i></th>
            <th>Aksi</th>
          </tr>
        </thead>

        <tbody id="taskTableBody">
          
        </tbody>
      </table>

      <div class="tugas-empty" id="tugasEmpty" style="display:none">
        <i class="fa-solid fa-inbox"></i>
        <p>Tidak ada tugas yang cocok.</p>
      </div>
    </div>

  </div>

  <!-- MODAL TAMBAH TUGAS -->
    <div class="modal-overlay" id="modalTugas">
      <div class="modal-box">
        <div class="modal-header">
          <h3>Tambah Tugas Baru</h3>
          <button class="modal-close" id="btnCloseModal">&times;</button>
        </div>

        <form id="formTugas">
          <div class="form-group">
            <label for="inputNamaTugas">Nama Tugas</label>
            <input type="text" id="inputNamaTugas" required placeholder="Contoh: Desain UI Dashboard">
          </div>

          <div class="form-group">
            <label for="inputDeadline">Deadline</label>
            <input type="date" id="inputDeadline" required>
          </div>

          <div class="form-group">
            <label for="inputStatus">Status</label>
            <select id="inputStatus" required>
              <option value="belum">Belum Mulai</option>
              <option value="proses">Sedang Berjalan</option>
              <option value="selesai">Selesai</option>
            </select>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn-secondary" id="btnBatalTugas">Batal</button>
            <button type="submit" class="btn-primary">Simpan Tugas</button>
          </div>
        </form>
      </div>
    </div>
</section>

   <script src="script.js"></script>

  </body>
</html>
